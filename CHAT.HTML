<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat Ultimate Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, off, onValue, set, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPUG_5NKAZAc2S5ddzGIlQkuysV-aRsyM",
            authDomain: "my-msg-app-92faa.firebaseapp.com",
            projectId: "my-msg-app-92faa",
            storageBucket: "my-msg-app-92faa.firebasestorage.app",
            messagingSenderId: "654492278706",
            appId: "1:654492278706:web:1309303447cf223b564eab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let activeChatPartner = null;
        let chatRef = null;
        let typingTimeout;

        // --- AUTH ---
        window.handleSignUp = async () => {
            const code = document.getElementById('reg-code').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            if(!code || !pass || !name) return alert("Fill all fields");
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, code + "@viral.com", pass);
                await updateProfile(userCredential.user, { displayName: name });
                await set(ref(db, `users/${code}`), { name: name, code: code });
                location.reload();
            } catch (e) { alert(e.message); }
        };

        window.handleLogin = async () => {
            const code = document.getElementById('login-code').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, code + "@viral.com", pass); } catch (e) { alert("Login Failed"); }
        };

        window.logout = () => signOut(auth);

        // --- TYPING LOGIC ---
        window.sendTypingStatus = (isTyping) => {
            if (!activeChatPartner) return;
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            set(ref(db, `typing/${chatId}/${myCode}`), isTyping);
        };

        document.getElementById('message-input').addEventListener('input', () => {
            sendTypingStatus(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => sendTypingStatus(false), 2000);
        });

        // --- CHAT LIST (Fixed Duplicate rendering) ---
        function listenToChatList() {
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const listContainer = document.getElementById('chat-list');
            
            onValue(ref(db, `user_chats/${myCode}`), (snapshot) => {
                listContainer.innerHTML = ''; // Clear container to avoid visual duplication
                const chats = snapshot.val();
                if (!chats) return;

                Object.keys(chats).forEach(partnerCode => {
                    const div = document.createElement('div');
                    div.id = `sidebar-${partnerCode}`; // Assign unique ID to prevent multi-elements
                    div.className = `p-4 border-b border-gray-800 cursor-pointer hover:bg-gray-800 flex items-center gap-3 ${activeChatPartner === partnerCode ? 'bg-gray-800 border-l-4 border-red-600' : ''}`;
                    div.onclick = () => openChat(partnerCode);
                    div.innerHTML = `<div class="w-10 h-10 bg-red-700 rounded-full flex items-center justify-center font-bold text-white uppercase">${partnerCode[0]}</div>
                                     <div class="flex-grow"><p class="text-sm font-bold text-white uppercase tracking-tighter">${partnerCode}</p><p class="text-[10px] text-gray-500 italic">Chat Saved</p></div>`;
                    listContainer.appendChild(div);
                });
            });
        }

        window.startNewChat = async () => {
            const searchCode = document.getElementById('search-user').value.trim().toLowerCase();
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            if(!searchCode || searchCode === myCode) return;
            
            // Check if already exists before setting
            const check = await get(ref(db, `user_chats/${myCode}/${searchCode}`));
            if(!check.exists()) {
                await set(ref(db, `user_chats/${myCode}/${searchCode}`), { active: true });
                await set(ref(db, `user_chats/${searchCode}/${myCode}`), { active: true });
            }
            
            openChat(searchCode);
            document.getElementById('search-user').value = '';
        };

        function openChat(partnerCode) {
            if(activeChatPartner === partnerCode) return;
            activeChatPartner = partnerCode.toLowerCase();
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('welcome-view').classList.add('hidden');
            document.getElementById('chat-partner-name').innerText = activeChatPartner;
            document.getElementById('side-panel').classList.add('hidden', 'md:block');
            
            loadMessages();
            listenToPartnerTyping();
            listenToChatList(); // Refresh highlighting
        }

        function listenToPartnerTyping() {
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            onValue(ref(db, `typing/${chatId}/${activeChatPartner}`), (snap) => {
                document.getElementById('typing-indicator').innerText = snap.val() ? "typing..." : "";
            });
        }

        window.deleteCurrentChat = async () => {
            if (!confirm("Delete all data for this chat?")) return;
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const partnerCode = activeChatPartner.toLowerCase();
            const chatId = [myCode, partnerCode].sort().join("_");
            await remove(ref(db, `user_chats/${myCode}/${partnerCode}`));
            await remove(ref(db, `private_messages/${chatId}`)); 
            await remove(ref(db, `typing/${chatId}`));
            location.reload();
        };

        function loadMessages() {
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = '';
            if(chatRef) off(chatRef);

            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            chatRef = ref(db, 'private_messages/' + chatId);
            
            onChildAdded(chatRef, (data) => {
                const msg = data.val();
                const msgId = data.key;
                const isMe = msg.sender.toLowerCase() === myCode;

                if (!isMe && msg.status !== 'seen') {
                    update(ref(db, `private_messages/${chatId}/${msgId}`), { status: 'seen' });
                }
                
                if (!document.getElementById(`msg-${msgId}`)) {
                    renderMessage(msgId, msg, isMe);
                }
            });

            onChildChanged(chatRef, (data) => {
                const msgId = data.key;
                const tickElement = document.getElementById(`tick-${msgId}`);
                if (tickElement && data.val().status === 'seen') {
                    tickElement.className = "fas fa-check-double text-[10px] ml-1 text-blue-400";
                }
            });
        }

        function renderMessage(id, msg, isMe) {
            const msgContainer = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            const tickColor = msg.status === 'seen' ? 'text-blue-400' : 'text-gray-500';
            const tickIcon = isMe ? `<i id="tick-${id}" class="fas fa-check-double text-[10px] ml-1 ${tickColor}"></i>` : '';

            div.className = `p-3 my-2 rounded-2xl max-w-[80%] shadow-md ${isMe ? 'bg-red-600 ml-auto rounded-tr-none' : 'bg-gray-800 rounded-tl-none border border-gray-700 text-gray-200'}`;
            div.innerHTML = `<p class="text-[9px] opacity-50 mb-1">${isMe ? 'You' : msg.senderName}</p>
                             <p class="text-sm leading-tight">${msg.text}</p>
                             <div class="flex justify-end items-center mt-1 text-[8px] opacity-70">
                                ${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ${tickIcon}
                             </div>`;
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(!text || !activeChatPartner) return;

            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const partnerCode = activeChatPartner.toLowerCase();
            const chatId = [myCode, partnerCode].sort().join("_");
            
            const messageData = {
                sender: myCode,
                senderName: auth.currentUser.displayName,
                text: text,
                timestamp: Date.now(),
                status: 'delivered'
            };

            push(ref(db, 'private_messages/' + chatId), messageData);
            input.value = '';
            sendTypingStatus(false);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.displayName;
                listenToChatList();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        window.closeChat = () => {
            document.getElementById('side-panel').classList.remove('hidden');
            document.getElementById('chat-view').classList.add('hidden', 'md:block');
            activeChatPartner = null;
        }

        window.toggleAuth = () => {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); }
        #messages { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-black text-white font-sans h-screen overflow-hidden">

    <div id="auth-screen" class="h-full flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl border border-gray-800 w-full max-w-sm">
            <h1 class="text-3xl font-black text-red-600 mb-8 text-center italic tracking-tighter uppercase">Flash Chat</h1>
            <div id="login-form" class="space-y-4 text-center">
                <input id="login-code" type="text" placeholder="Access Code" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none focus:border-red-600">
                <input id="login-pass" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none focus:border-red-600">
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl font-bold hover:scale-105 transition">Login</button>
                <button onclick="toggleAuth()" class="text-xs text-gray-500 mt-4 underline italic">Create Account</button>
            </div>
            <div id="signup-form" class="space-y-4 hidden text-center">
                <input id="reg-code" type="text" placeholder="Access Code" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="reg-pass" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="reg-name" type="text" placeholder="Full Name" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <button onclick="handleSignUp()" class="w-full bg-green-600 py-4 rounded-xl font-bold">Sign Up</button>
                <button onclick="toggleAuth()" class="text-xs text-gray-500 mt-4 underline italic">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden flex h-full">
        <div id="side-panel" class="w-full md:w-80 border-r border-gray-800 flex flex-col bg-gray-950">
            <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900">
                <span class="font-black text-red-600 italic tracking-widest text-lg">MESSAGES</span>
                <button onclick="logout()" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full text-gray-400 font-bold uppercase">Exit</button>
            </header>
            <div class="p-4">
                <div class="flex gap-2 bg-black border border-gray-800 p-1 rounded-xl">
                    <input id="search-user" type="text" placeholder="Enter Friend's Code..." class="flex-grow bg-transparent p-2 text-xs outline-none">
                    <button onclick="startNewChat()" class="bg-red-600 px-4 rounded-xl transition active:scale-90"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <div id="chat-list" class="flex-grow overflow-y-auto no-scrollbar"></div>
            <div class="p-3 bg-gray-900 text-[9px] text-center text-red-500 uppercase font-bold tracking-widest border-t border-gray-800">
                MY ID: <span id="user-display"></span>
            </div>
        </div>

        <div id="main-view" class="flex-grow flex flex-col bg-black">
            <div id="welcome-view" class="h-full flex items-center justify-center text-gray-800 uppercase text-xs tracking-widest italic">Select a conversation</div>
            <div id="chat-view" class="hidden flex flex-col h-full">
                <header class="p-4 bg-gray-900 border-b border-gray-800 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="closeChat()" class="md:hidden text-gray-400"><i class="fas fa-arrow-left"></i></button>
                        <div>
                            <h2 id="chat-partner-name" class="font-black text-sm text-red-500 uppercase tracking-widest">User</h2>
                            <p id="typing-indicator" class="text-[10px] text-green-500 h-2 italic"></p>
                        </div>
                    </div>
                    <button onclick="deleteCurrentChat()" class="text-gray-600 hover:text-red-500 transition px-2"><i class="fas fa-trash-alt"></i></button>
                </header>
                <div id="messages" class="flex-grow overflow-y-auto p-4 space-y-2 no-scrollbar"></div>
                <div class="p-4 bg-gray-900 border-t border-gray-800 flex gap-2 pb-10 md:pb-4">
                    <input id="message-input" type="text" placeholder="Type a message..." class="flex-grow bg-black border border-gray-800 p-4 rounded-xl text-sm outline-none focus:border-red-600 transition">
                    <button onclick="sendMessage()" class="bg-red-600 w-14 h-14 rounded-2xl flex items-center justify-center active:scale-95 transition">
                        <i class="fas fa-paper-plane text-white text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
