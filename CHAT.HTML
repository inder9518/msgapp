<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Private Chat Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, off, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPUG_5NKAZAc2S5ddzGIlQkuysV-aRsyM",
            authDomain: "my-msg-app-92faa.firebaseapp.com",
            projectId: "my-msg-app-92faa",
            storageBucket: "my-msg-app-92faa.firebasestorage.app",
            messagingSenderId: "654492278706",
            appId: "1:654492278706:web:1309303447cf223b564eab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let activeChatPartner = null;
        let chatRef = null;
        let replyTo = null;
        let pressTimer;

        // --- AUTH LOGIC ---
        window.handleSignUp = async () => {
            const code = document.getElementById('reg-code').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, code + "@viral.com", pass);
                await updateProfile(userCredential.user, { displayName: name });
                location.reload();
            } catch (e) { alert(e.message); }
        };

        window.handleLogin = async () => {
            const code = document.getElementById('login-code').value.trim();
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, code + "@viral.com", pass); } catch (e) { alert("Error"); }
        };

        window.logout = () => signOut(auth);

        // --- SEARCH ICON TOGGLE ---
        window.toggleSearch = () => {
            const bar = document.getElementById('search-bar-container');
            const icon = document.getElementById('search-trigger-icon');
            bar.classList.toggle('hidden');
            icon.classList.toggle('text-red-600');
        };

        // --- TYPING STATUS ---
        let typingTimeout;
        window.handleTyping = () => {
            const myCode = auth.currentUser.email.split('@')[0];
            const chatId = [myCode, activeChatPartner].sort().join("_");
            set(ref(db, `typing/${chatId}/${myCode}`), true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                set(ref(db, `typing/${chatId}/${myCode}`), false);
            }, 2000);
        };

        // --- CHAT LIST & RECENT ---
        function updateChatList() {
            const myCode = auth.currentUser.email.split('@')[0];
            onValue(ref(db, `user_chats/${myCode}`), (snapshot) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = '';
                const chats = snapshot.val();
                if (chats) {
                    Object.keys(chats).forEach(code => {
                        const div = document.createElement('div');
                        div.className = `p-4 border-b border-gray-800 cursor-pointer flex items-center gap-3 hover:bg-gray-800`;
                        div.onclick = () => openChat(code);
                        div.innerHTML = `<div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-bold">${code[0]}</div>
                                         <div><p class="text-sm font-bold">${code}</p><p class="text-[10px] text-gray-500">Tap to chat</p></div>`;
                        list.appendChild(div);
                    });
                }
            });
        }

        window.startNewChat = () => {
            const code = document.getElementById('search-user').value.trim();
            if(code) { openChat(code); toggleSearch(); }
        };

        function openChat(partnerCode) {
            activeChatPartner = partnerCode;
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('welcome-view').classList.add('hidden');
            document.getElementById('chat-partner-name').innerText = partnerCode;
            document.getElementById('side-panel').classList.add('hidden', 'md:block');
            
            loadMessages();
            listenTyping();
        }

        function listenTyping() {
            const myCode = auth.currentUser.email.split('@')[0];
            const chatId = [myCode, activeChatPartner].sort().join("_");
            onValue(ref(db, `typing/${chatId}/${activeChatPartner}`), (snap) => {
                document.getElementById('typing-indicator').innerText = snap.val() ? "typing..." : "";
            });
        }

        // --- MESSAGE LOGIC ---
        function loadMessages() {
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = '';
            const myCode = auth.currentUser.email.split('@')[0];
            const chatId = [myCode, activeChatPartner].sort().join("_");
            chatRef = ref(db, 'private_messages/' + chatId);

            onValue(chatRef, (snapshot) => {
                msgContainer.innerHTML = '';
                snapshot.forEach((child) => {
                    const msg = child.val();
                    const msgId = child.key;
                    if(msg.deletedBy && msg.deletedBy[myCode]) return;

                    const div = document.createElement('div');
                    const isMe = msg.sender === myCode;
                    
                    // Mark as read if received
                    if(!isMe && msg.status !== 'read') {
                        update(ref(db, `private_messages/${chatId}/${msgId}`), { status: 'read' });
                    }

                    div.className = `group relative p-3 my-2 rounded-2xl max-w-[80%] ${isMe ? 'bg-red-600 ml-auto rounded-tr-none' : 'bg-gray-800 rounded-tl-none'}`;
                    
                    // Swipe Logic Simulation & Long Press
                    div.onmousedown = () => pressTimer = setTimeout(() => showMenu(msgId, isMe, msg.text), 600);
                    div.onmouseup = () => clearTimeout(pressTimer);
                    div.ontouchstart = () => pressTimer = setTimeout(() => showMenu(msgId, isMe, msg.text), 600);
                    div.ontouchend = () => clearTimeout(pressTimer);

                    let tickClass = msg.status === 'read' ? 'text-blue-400' : 'text-gray-400';
                    let ticks = isMe ? `<i class="fas fa-check-double text-[10px] ${tickClass} ml-1"></i>` : '';

                    div.innerHTML = `
                        ${msg.replyTo ? `<div class="bg-black/20 p-2 rounded text-[10px] mb-1 italic border-l-2">Replying to: ${msg.replyTo}</div>` : ''}
                        <p class="text-sm">${msg.text}</p>
                        <div class="text-[9px] flex justify-end items-center mt-1 opacity-70">
                            ${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ${ticks}
                        </div>
                    `;
                    msgContainer.appendChild(div);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        window.sendMessage = () => {
            const input = document.getElementById('message-input');
            const text = input.value;
            if(!text || !activeChatPartner) return;

            const myCode = auth.currentUser.email.split('@')[0];
            const chatId = [myCode, activeChatPartner].sort().join("_");
            
            const msgData = {
                sender: myCode,
                senderName: auth.currentUser.displayName,
                text: text,
                timestamp: Date.now(),
                status: 'sent',
                replyTo: replyTo
            };

            push(ref(db, 'private_messages/' + chatId), msgData);
            set(ref(db, `user_chats/${myCode}/${activeChatPartner}`), { last: Date.now() });
            set(ref(db, `user_chats/${activeChatPartner}/${myCode}`), { last: Date.now() });

            input.value = '';
            cancelReply();
        };

        // --- EDIT / DELETE LOGIC ---
        let currentMenuMsg = null;
        function showMenu(id, isMe, text) {
            currentMenuMsg = id;
            document.getElementById('msg-menu').classList.remove('hidden');
            document.getElementById('edit-btn').style.display = isMe ? 'block' : 'none';
            document.getElementById('del-everyone').style.display = isMe ? 'block' : 'none';
        }

        window.hideMenu = () => document.getElementById('msg-menu').classList.add('hidden');

        window.deleteMsg = (type) => {
            const myCode = auth.currentUser.email.split('@')[0];
            const chatId = [myCode, activeChatPartner].sort().join("_");
            if(type === 'everyone') {
                remove(ref(db, `private_messages/${chatId}/${currentMenuMsg}`));
            } else {
                update(ref(db, `private_messages/${chatId}/${currentMenuMsg}/deletedBy`), { [myCode]: true });
            }
            hideMenu();
        };

        window.editMsg = () => {
            const newText = prompt("Edit your message:");
            if(newText) {
                const myCode = auth.currentUser.email.split('@')[0];
                const chatId = [myCode, activeChatPartner].sort().join("_");
                update(ref(db, `private_messages/${chatId}/${currentMenuMsg}`), { text: newText + " (edited)" });
            }
            hideMenu();
        };

        // Reply Logic
        window.cancelReply = () => {
            replyTo = null;
            document.getElementById('reply-bar').classList.add('hidden');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.displayName;
                updateChatList();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        window.closeChat = () => {
            document.getElementById('side-panel').classList.remove('hidden');
            document.getElementById('chat-view').classList.add('hidden', 'md:block');
        }

    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .reply-swipe { overflow-x: hidden; touch-action: pan-y; }
    </style>
</head>
<body class="bg-black text-white font-sans h-screen overflow-hidden">

    <div id="auth-screen" class="h-full flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl border border-gray-800 w-full max-w-sm">
            <h1 class="text-3xl font-black text-red-600 mb-8 text-center italic">FLASHCHAT</h1>
            <div id="login-form" class="space-y-4">
                <input id="login-code" type="text" placeholder="Access Code" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="login-pass" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl font-bold">LOGIN</button>
            </div>
            <div id="signup-form" class="space-y-4 hidden">
                <input id="reg-code" type="text" placeholder="Create Access Code" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="reg-pass" type="password" placeholder="Set Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="reg-name" type="text" placeholder="Your Name" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <button onclick="handleSignUp()" class="w-full bg-green-600 py-4 rounded-xl font-bold">SIGN UP</button>
            </div>
            <button onclick="toggleAuth()" class="w-full mt-6 text-xs text-gray-500 text-center">Switch Login/Signup</button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex h-full">
        <div id="side-panel" class="w-full md:w-80 border-r border-gray-800 flex flex-col bg-gray-950">
            <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900">
                <span class="font-black text-red-600 italic">FLASHCHAT</span>
                <div class="flex gap-4 items-center">
                    <i id="search-trigger-icon" onclick="toggleSearch()" class="fas fa-search cursor-pointer transition"></i>
                    <button onclick="logout()" class="text-[10px] text-gray-500">Logout</button>
                </div>
            </header>
            
            <div id="search-bar-container" class="p-4 hidden">
                <div class="flex gap-2">
                    <input id="search-user" type="text" placeholder="Enter user code..." class="flex-grow bg-gray-900 border border-gray-700 p-2 rounded-lg text-xs outline-none">
                    <button onclick="startNewChat()" class="bg-red-600 px-3 rounded-lg"><i class="fas fa-plus text-xs"></i></button>
                </div>
            </div>

            <div id="chat-list" class="flex-grow overflow-y-auto no-scrollbar"></div>
        </div>

        <div id="main-view" class="flex-grow flex flex-col bg-black">
            <div id="welcome-view" class="h-full flex items-center justify-center text-gray-700 italic">Select a chat</div>

            <div id="chat-view" class="hidden flex flex-col h-full">
                <header class="p-4 bg-gray-900 border-b border-gray-800 flex items-center gap-3">
                    <button onclick="closeChat()" class="md:hidden text-gray-400"><i class="fas fa-arrow-left"></i></button>
                    <div>
                        <h2 id="chat-partner-name" class="font-bold text-sm">User</h2>
                        <p id="typing-indicator" class="text-[10px] text-green-500 h-2"></p>
                    </div>
                </header>

                <div id="messages" class="flex-grow overflow-y-auto p-4 space-y-2 no-scrollbar bg-gray-950 bg-[url('https://i.pinimg.com/originals/85/ec/3b/85ec3b71f98144026362d29486c47864.jpg')] bg-blend-multiply">
                </div>

                <div id="reply-bar" class="hidden bg-gray-800 p-2 mx-4 rounded-t-xl flex justify-between items-center text-xs border-l-4 border-red-600">
                    <span id="reply-text" class="truncate italic opacity-70"></span>
                    <i onclick="cancelReply()" class="fas fa-times cursor-pointer"></i>
                </div>

                <div class="p-4 bg-gray-900 border-t border-gray-800 flex gap-2 pb-8 md:pb-4">
                    <input id="message-input" oninput="handleTyping()" type="text" placeholder="Type message..." class="flex-grow bg-black border border-gray-700 p-3 rounded-xl outline-none text-sm">
                    <button onclick="sendMessage()" class="bg-red-600 w-12 h-12 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="msg-menu" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6">
        <div class="bg-gray-900 w-full max-w-xs rounded-3xl overflow-hidden shadow-2xl">
            <button onclick="editMsg()" id="edit-btn" class="w-full p-4 border-b border-gray-800 hover:bg-gray-800 flex items-center gap-4"><i class="fas fa-edit"></i> Edit Message</button>
            <button onclick="deleteMsg('everyone')" id="del-everyone" class="w-full p-4 border-b border-gray-800 hover:bg-gray-800 flex items-center gap-4 text-red-500"><i class="fas fa-trash-alt"></i> Delete for Everyone</button>
            <button onclick="deleteMsg('me')" class="w-full p-4 border-b border-gray-800 hover:bg-gray-800 flex items-center gap-4"><i class="fas fa-trash"></i> Delete for Me</button>
            <button onclick="hideMenu()" class="w-full p-4 bg-gray-800 font-bold">Cancel</button>
        </div>
    </div>

</body>
</html>
