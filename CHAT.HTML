<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlashChat Pro Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, off, onValue, set, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPUG_5NKAZAc2S5ddzGIlQkuysV-aRsyM",
            authDomain: "my-msg-app-92faa.firebaseapp.com",
            projectId: "my-msg-app-92faa",
            storageBucket: "my-msg-app-92faa.firebasestorage.app",
            messagingSenderId: "654492278706",
            appId: "1:654492278706:web:1309303447cf223b564eab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let activeChatPartner = null;
        let chatRef = null;
        let typingRef = null;
        let typingTimeout;
        let replyData = null;
        let selectedMsgId = null;
        let touchStartX = 0;

        window.showAlert = (msg) => {
            document.getElementById('custom-alert-text').innerText = msg;
            document.getElementById('custom-alert').classList.remove('hidden');
        };
        window.closeAlert = () => document.getElementById('custom-alert').classList.add('hidden');

        window.handleSignUp = async () => {
            const code = document.getElementById('reg-code').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            if(!code || !pass || !name) return showAlert("Fill all fields");
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, code + "@viral.com", pass);
                await updateProfile(userCredential.user, { displayName: name });
                await set(ref(db, `users/${code}`), { name: name, code: code });
                location.reload();
            } catch (e) { showAlert(e.message); }
        };

        window.handleLogin = async () => {
            const code = document.getElementById('login-code').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, code + "@viral.com", pass); } catch (e) { showAlert("Login Failed"); }
        };

        window.logout = () => signOut(auth);

        // Typing Status logic
        window.sendTypingStatus = (isTyping) => {
            if (!activeChatPartner || !auth.currentUser) return;
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            set(ref(db, `typing/${chatId}/${myCode}`), isTyping);
        };

        function listenToChatList() {
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const listContainer = document.getElementById('chat-list');
            onValue(ref(db, `user_chats/${myCode}`), async (snapshot) => {
                listContainer.innerHTML = '';
                const chats = snapshot.val();
                if (!chats) return;
                const globalUsersSnap = await get(ref(db, 'users'));
                const globalUsers = globalUsersSnap.val() || {};
                Object.keys(chats).forEach(partnerCode => {
                    if (!globalUsers[partnerCode]) {
                        remove(ref(db, `user_chats/${myCode}/${partnerCode}`));
                        return;
                    }
                    const div = document.createElement('div');
                    div.className = `p-4 border-b border-gray-800 cursor-pointer hover:bg-gray-800 flex items-center gap-3 ${activeChatPartner === partnerCode ? 'bg-gray-800 border-l-4 border-red-600' : ''}`;
                    div.onclick = () => openChat(partnerCode);
                    div.innerHTML = `<div class="w-10 h-10 bg-red-700 rounded-full flex items-center justify-center font-bold text-white uppercase">${partnerCode[0]}</div>
                                     <div class="flex-grow"><p class="text-sm font-bold text-white uppercase tracking-tighter">${partnerCode}</p><p class="text-[10px] text-gray-500 italic">Chat Saved</p></div>`;
                    listContainer.appendChild(div);
                });
            });
        }

        window.startNewChat = async () => {
            const searchCode = document.getElementById('search-user').value.trim().toLowerCase();
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            if(!searchCode || searchCode === myCode) return;
            const userCheck = await get(ref(db, `users/${searchCode}`));
            if (!userCheck.exists()) return showAlert("User Code does not exist!");
            await set(ref(db, `user_chats/${myCode}/${searchCode}`), { active: true });
            await set(ref(db, `user_chats/${searchCode}/${myCode}`), { active: true });
            openChat(searchCode);
            document.getElementById('search-user').value = '';
        };

        function openChat(partnerCode) {
            if (activeChatPartner === partnerCode) return;
            activeChatPartner = partnerCode.toLowerCase();
            document.getElementById('chat-view-container').classList.remove('hidden');
            document.getElementById('welcome-view').classList.add('hidden');
            document.getElementById('chat-partner-name').innerText = activeChatPartner;
            document.getElementById('side-panel').classList.add('hidden', 'md:block');
            loadMessages();
            listenToPartnerTyping();
        }

        function listenToPartnerTyping() {
            if (typingRef) off(typingRef);
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            typingRef = ref(db, `typing/${chatId}/${activeChatPartner}`);
            onValue(typingRef, (snap) => {
                const indicator = document.getElementById('typing-indicator');
                if (snap.val() === true) {
                    indicator.innerText = "typing...";
                    indicator.classList.remove('opacity-0');
                } else {
                    indicator.innerText = "";
                    indicator.classList.add('opacity-0');
                }
            });
        }

        function loadMessages() {
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = '';
            if(chatRef) off(chatRef);
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            chatRef = ref(db, 'private_messages/' + chatId);
            onChildAdded(chatRef, (data) => {
                const msg = data.val();
                const msgId = data.key;
                if (msg.deletedFor && msg.deletedFor[myCode]) return;
                const isMe = msg.sender.toLowerCase() === myCode;
                if (!isMe && msg.status !== 'seen') update(ref(db, `private_messages/${chatId}/${msgId}`), { status: 'seen' });
                renderMessage(msgId, msg, isMe);
            });
            onChildChanged(chatRef, (data) => {
                const msg = data.val();
                const msgId = data.key;
                if (msg.deletedFor && msg.deletedFor[myCode]) {
                    document.getElementById(`msg-${msgId}`)?.remove();
                } else {
                    const textEl = document.getElementById(`text-${msgId}`);
                    if(textEl) textEl.innerText = msg.text + (msg.edited ? " (edited)" : "");
                    const tick = document.getElementById(`tick-${msgId}`);
                    if(tick && msg.status === 'seen') tick.className = "fas fa-check-double text-[10px] ml-1 text-blue-400";
                }
            });
            onChildRemoved(chatRef, (data) => document.getElementById(`msg-${data.key}`)?.remove());
        }

        function renderMessage(id, msg, isMe) {
            const msgContainer = document.getElementById('messages');
            if (document.getElementById(`msg-${id}`)) return;
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            const tickColor = msg.status === 'seen' ? 'text-blue-400' : 'text-gray-500';
            const tickIcon = isMe ? `<i id="tick-${id}" class="fas fa-check-double text-[10px] ml-1 ${tickColor}"></i>` : '';

            div.className = `p-3 my-2 rounded-2xl w-fit max-w-[85%] min-w-[100px] shadow-md transition-transform relative bg-gray-800 border border-gray-700 text-gray-200 ${isMe ? 'bg-red-600 ml-auto rounded-tr-none' : 'bg-gray-800 rounded-tl-none'}`;
            
            let pressTimer;
            div.ontouchstart = (e) => {
                touchStartX = e.touches[0].clientX;
                pressTimer = setTimeout(() => openOptions(id, isMe, msg.text), 600);
            };
            div.ontouchend = (e) => {
                clearTimeout(pressTimer);
                let touchEndX = e.changedTouches[0].clientX;
                if (touchEndX - touchStartX > 80) setReply(msg.senderName, msg.text);
            };
            div.oncontextmenu = (e) => { e.preventDefault(); openOptions(id, isMe, msg.text); };

            div.innerHTML = `
                ${msg.replyTo ? `<div class="bg-black/20 p-2 rounded text-[10px] mb-1 italic border-l-2 border-white/30 truncate text-gray-300 font-serif">Replying to: ${msg.replyTo.text}</div>` : ''}
                <p id="text-${id}" class="text-sm leading-tight break-words">${msg.text}${msg.edited ? ' (edited)' : ''}</p>
                <div class="flex justify-end items-center mt-1 text-[8px] opacity-70">
                    ${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ${tickIcon}
                </div>`;
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        window.setReply = (name, text) => {
            replyData = { name, text };
            document.getElementById('reply-preview').innerText = text;
            document.getElementById('reply-container').classList.remove('hidden');
            document.getElementById('message-input').focus();
        };
        window.cancelReply = () => { replyData = null; document.getElementById('reply-container').classList.add('hidden'); };

        window.openOptions = (id, isMe, text) => {
            selectedMsgId = id;
            document.getElementById('msg-menu').classList.remove('hidden');
            document.getElementById('edit-btn').style.display = isMe ? 'block' : 'none';
            document.getElementById('del-everyone-btn').style.display = isMe ? 'block' : 'none';
        };

        window.closeMenu = () => document.getElementById('msg-menu').classList.add('hidden');

        window.execDelete = async (mode) => {
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            if(mode === 'everyone') await remove(ref(db, `private_messages/${chatId}/${selectedMsgId}`));
            else await update(ref(db, `private_messages/${chatId}/${selectedMsgId}/deletedFor`), { [myCode]: true });
            closeMenu();
        };

        window.execEdit = () => {
            const text = document.getElementById(`text-${selectedMsgId}`).innerText.replace(" (edited)", "");
            document.getElementById('edit-input').value = text;
            document.getElementById('edit-modal').classList.remove('hidden');
            closeMenu();
        };

        window.saveEdit = async () => {
            const newText = document.getElementById('edit-input').value;
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            await update(ref(db, `private_messages/${chatId}/${selectedMsgId}`), { text: newText, edited: true });
            document.getElementById('edit-modal').classList.add('hidden');
        };

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(!text || !activeChatPartner) return;
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            const messageData = {
                sender: myCode, senderName: auth.currentUser.displayName,
                text: text, timestamp: Date.now(), status: 'delivered',
                replyTo: replyData
            };
            push(ref(db, 'private_messages/' + chatId), messageData);
            input.value = '';
            cancelReply();
            sendTypingStatus(false);
            msgContainerScroll();
        };

        function msgContainerScroll() {
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }

        // AUTO AUTH & RELOAD PROTECTION
        onAuthStateChanged(auth, (user) => {
            const loadingOverlay = document.getElementById('loading-overlay');
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.displayName;
                listenToChatList();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
            loadingOverlay.classList.add('hidden'); // Hide black screen after auth check
        });

        window.deleteCurrentChat = async () => {
            if(!confirm("Are you sure?")) return;
            const myCode = auth.currentUser.email.split('@')[0].toLowerCase();
            const chatId = [myCode, activeChatPartner].sort().join("_");
            await remove(ref(db, `user_chats/${myCode}/${activeChatPartner}`));
            await remove(ref(db, `private_messages/${chatId}`));
            location.reload();
        }

        window.closeChat = () => {
            document.getElementById('side-panel').classList.remove('hidden');
            document.getElementById('chat-view-container').classList.add('hidden');
            activeChatPartner = null;
        }

        window.toggleAuth = () => {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const height = window.visualViewport.height;
                document.body.style.height = height + 'px';
                window.scrollTo(0, 0);
                setTimeout(msgContainerScroll, 100);
            });
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); }
        .break-words { overflow-wrap: break-word; word-break: break-word; }
        
        body { height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; position: fixed; top: 0; left: 0; background: black; }
        #app-screen { height: 100%; display: flex; overflow: hidden; width: 100%; }
        #chat-view-container { flex: 1; display: flex; flex-direction: column; background: black; height: 100%; position: relative; }
        #messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; scroll-behavior: smooth; }
        #input-area { flex-shrink: 0; background: #111827; width: 100%; }
        #typing-indicator { transition: opacity 0.3s ease; }

        /* Fix for refresh flash */
        #loading-overlay { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden select-none">

    <!-- Loading Screen to prevent refresh flash -->
    <div id="loading-overlay">
        <div class="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="auth-screen" class="hidden h-full flex items-center justify-center p-6 w-full">
        <div class="glass p-8 rounded-3xl border border-gray-800 w-full max-w-sm">
            <h1 class="text-3xl font-black text-red-600 mb-8 text-center italic uppercase">Flash Chat</h1>
            <div id="login-form" class="space-y-4 text-center">
                <input id="login-code" type="text" autocomplete="off" spellcheck="false" placeholder="Access Code" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none focus:border-red-600">
                <input id="login-pass" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none focus:border-red-600">
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl font-bold">Login</button>
                <button onclick="toggleAuth()" class="text-xs text-gray-500 mt-4 underline italic text-center w-full">New User? Signup</button>
            </div>
            <div id="signup-form" class="space-y-4 hidden text-center">
                <input id="reg-code" type="text" autocomplete="off" spellcheck="false" placeholder="Choose Code" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="reg-pass" type="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <input id="reg-name" type="text" autocomplete="off" spellcheck="false" placeholder="Display Name" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none">
                <button onclick="handleSignUp()" class="w-full bg-green-600 py-4 rounded-xl font-bold">Sign Up</button>
                <button onclick="toggleAuth()" class="text-xs text-gray-500 mt-4 underline italic text-center w-full">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div id="side-panel" class="w-full md:w-80 border-r border-gray-800 flex flex-col bg-gray-950">
            <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900 h-[60px]">
                <span class="font-black text-red-600 italic">MESSAGES</span>
                <button onclick="logout()" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full text-gray-400 uppercase font-bold">Exit</button>
            </header>
            <div class="p-4">
                <div class="flex gap-2 bg-black border border-gray-800 p-1 rounded-xl">
                    <input id="search-user" type="text" autocomplete="off" spellcheck="false" placeholder="Search Code..." class="flex-grow bg-transparent p-2 text-xs outline-none">
                    <button onclick="startNewChat()" class="bg-red-600 px-4 rounded-xl active:scale-95"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <div id="chat-list" class="flex-grow overflow-y-auto no-scrollbar"></div>
            <div class="p-3 bg-gray-900 text-[9px] text-center text-red-500 uppercase font-bold border-t border-gray-800 tracking-widest">
                MY ID: <span id="user-display"></span>
            </div>
        </div>

        <div id="main-view" class="flex-grow flex flex-col bg-black h-full">
            <div id="welcome-view" class="h-full flex items-center justify-center text-gray-700 uppercase text-xs tracking-widest italic font-medium">Flash Chat Server Active</div>
            <div id="chat-view-container" class="hidden h-full">
                <header class="p-4 bg-gray-900 border-b border-gray-800 flex items-center justify-between h-[60px]">
                    <div class="flex items-center gap-4">
                        <button onclick="closeChat()" class="md:hidden text-gray-400"><i class="fas fa-arrow-left"></i></button>
                        <div>
                            <h2 id="chat-partner-name" class="font-black text-sm text-red-500 uppercase tracking-widest">User</h2>
                            <p id="typing-indicator" class="text-[10px] text-green-500 h-3 italic opacity-0"></p>
                        </div>
                    </div>
                    <button onclick="deleteCurrentChat()" class="text-gray-600 hover:text-red-500 px-2 transition"><i class="fas fa-trash-alt"></i></button>
                </header>
                
                <div id="messages" class="p-4 space-y-2 no-scrollbar bg-gray-950"></div>

                <div id="input-area">
                    <div id="reply-container" class="hidden bg-gray-800/80 p-3 border-l-4 border-red-600 mx-4 mt-2 rounded-t-xl flex justify-between items-center">
                        <p class="text-[10px] italic truncate text-gray-400" id="reply-preview"></p>
                        <i onclick="cancelReply()" class="fas fa-times text-xs cursor-pointer text-gray-500 ml-2"></i>
                    </div>

                    <div class="p-4 flex gap-2 items-center">
                        <input id="message-input" oninput="sendTypingStatus(true); clearTimeout(typingTimeout); typingTimeout = setTimeout(()=>sendTypingStatus(false),1500)" type="text" autocomplete="off" spellcheck="false" placeholder="Type a message..." class="flex-grow bg-black border border-gray-800 p-4 rounded-xl text-sm outline-none focus:border-red-600 transition">
                        <button onclick="sendMessage()" class="bg-red-600 w-14 h-14 rounded-2xl flex items-center justify-center active:scale-95 transition shadow-lg shrink-0"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="msg-menu" class="hidden fixed inset-0 bg-black/90 flex items-end md:items-center justify-center z-[100] p-6">
        <div class="glass w-full max-w-xs rounded-3xl overflow-hidden border border-gray-800">
            <button onclick="execEdit()" id="edit-btn" class="w-full p-4 border-b border-gray-800 flex items-center gap-4 font-bold text-sm text-white"><i class="fas fa-edit"></i> Edit</button>
            <button onclick="execDelete('everyone')" id="del-everyone-btn" class="w-full p-4 border-b border-gray-800 flex items-center gap-4 text-red-500 font-bold text-sm"><i class="fas fa-trash"></i> Delete for Everyone</button>
            <button onclick="execDelete('me')" class="w-full p-4 border-b border-gray-800 flex items-center gap-4 text-orange-500 font-bold text-sm"><i class="fas fa-user-slash"></i> Delete for Me</button>
            <button onclick="closeMenu()" class="w-full p-4 bg-gray-800 font-bold uppercase text-xs text-white">Cancel</button>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[110] p-6">
        <div class="glass w-full max-w-sm p-6 rounded-3xl border border-gray-800 shadow-2xl">
            <h3 class="mb-4 text-xs font-bold uppercase text-red-500 border-b border-gray-800 pb-2">Edit Message</h3>
            <textarea id="edit-input" class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none text-sm mb-4 h-24 text-white" spellcheck="false"></textarea>
            <div class="flex gap-2">
                <button onclick="saveEdit()" class="flex-grow bg-green-600 p-3 rounded-xl font-bold uppercase text-xs shadow-lg">Update</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-grow bg-gray-800 p-3 rounded-xl uppercase text-xs">Cancel</button>
            </div>
        </div>
    </div>

    <div id="custom-alert" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[120]">
        <div class="glass p-6 rounded-3xl border border-gray-800 text-center max-w-xs w-full shadow-2xl">
            <p id="custom-alert-text" class="text-sm font-medium mb-4 text-gray-300"></p>
            <button onclick="closeAlert()" class="bg-red-600 px-8 py-2 rounded-xl font-bold uppercase text-[10px]">Okay</button>
        </div>
    </div>
</body>
</html>
